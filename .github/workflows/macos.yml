name: macOS CI

on:
  push:
    branches: [ master ]
    tags:
      - "v*"
      - "V*"
  pull_request:
    branches: [ master ]

permissions:
  contents: write

env:
  BUILD_TYPE: Release
  QT_VERSION: 6.8.0

jobs:
  build:
    name: Build and package macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build tools
        run: brew install ninja

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          modules: qtserialport
          cache: true

      - name: Import Developer ID certificate
        id: signing
        if: startsWith(github.ref, 'refs/tags/')
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          if [[ -z "$MACOS_CERTIFICATE" || -z "$MACOS_CERTIFICATE_PASSWORD" || -z "$MACOS_SIGNING_IDENTITY" ]]; then
            echo "Developer ID signing secrets are required for macOS tag releases." >&2
            exit 1
          fi

          keychain_password="${KEYCHAIN_PASSWORD:-$(uuidgen)}"
          keychain_path="$RUNNER_TEMP/gnssview-signing.keychain-db"
          certificate_path="$RUNNER_TEMP/gnssview-signing.p12"

          printf '%s' "$MACOS_CERTIFICATE" | base64 -D > "$certificate_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" -k "$keychain_path" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12
          security list-keychains -d user -s "$keychain_path"
          security default-keychain -s "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"
          identities="$(security find-identity -v -p codesigning "$keychain_path")"
          echo "$identities"
          identity_hash="$(printf '%s\n' "$identities" | awk -v identity="$MACOS_SIGNING_IDENTITY" 'index($0, identity) { print $2; exit }')"
          if [[ -z "$identity_hash" ]]; then
            echo "Unable to find MACOS_SIGNING_IDENTITY in imported keychain identities." >&2
            exit 1
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "identity=$identity_hash" >> "$GITHUB_OUTPUT"
          rm -f "$certificate_path"

      - name: Configure
        run: |
          set -euo pipefail

          args=(
            -S .
            -B build
            -G Ninja
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
          )
          if [[ "${{ steps.signing.outputs.enabled }}" == "true" ]]; then
            args+=("-DHDGNSS_MACOS_SIGNING_IDENTITY=${{ steps.signing.outputs.identity }}")
          fi
          cmake "${args[@]}"

      - name: Build regression tests
        run: cmake --build build --target GnssViewRegression

      - name: Run regression tests
        run: ./build/GnssViewRegression

      - name: Build app
        run: cmake --build build --target GnssView

      - name: Build DMG
        run: cmake --build build --target GnssViewDmg

      - name: Locate DMG
        id: package
        run: |
          set -euo pipefail

          dmgs=()
          while IFS= read -r dmg; do
            dmgs+=("$dmg")
          done < <(find build -maxdepth 1 -type f -name 'GnssView-*-macOS-*.dmg' | sort)
          if [[ "${#dmgs[@]}" -eq 0 ]]; then
            echo "No GnssView DMG was found under build." >&2
            exit 1
          fi
          if [[ "${#dmgs[@]}" -gt 1 ]]; then
            printf 'Multiple GnssView DMGs were found:\n%s\n' "${dmgs[@]}" >&2
            exit 1
          fi
          dmg="${dmgs[0]}"
          echo "path=$dmg" >> "$GITHUB_OUTPUT"

          apps=()
          while IFS= read -r app; do
            apps+=("$app")
          done < <(find build/_CPack_Packages -type d -name 'GnssView.app' | sort)
          if [[ "${{ steps.signing.outputs.enabled }}" == "true" ]]; then
            if [[ "${#apps[@]}" -eq 0 ]]; then
              echo "No packaged GnssView.app was found under build/_CPack_Packages." >&2
              exit 1
            fi
            if [[ "${#apps[@]}" -gt 1 ]]; then
              printf 'Multiple packaged GnssView.app bundles were found:\n%s\n' "${apps[@]}" >&2
              exit 1
            fi
            echo "app_path=${apps[0]}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate app signature
        if: startsWith(github.ref, 'refs/tags/') && steps.signing.outputs.enabled == 'true'
        run: |
          set -euo pipefail

          app="${{ steps.package.outputs.app_path }}"
          codesign --verify --deep --strict --verbose=4 "$app"

          signature="$(codesign -dv --verbose=4 "$app" 2>&1)"
          printf '%s\n' "$signature"
          if grep -q 'Signature=adhoc' <<< "$signature"; then
            echo "GnssView.app is still ad-hoc signed." >&2
            exit 1
          fi
          if grep -q 'TeamIdentifier=not set' <<< "$signature"; then
            echo "GnssView.app has no Developer ID team identifier." >&2
            exit 1
          fi
          if ! grep -q 'Authority=Developer ID Application' <<< "$signature"; then
            echo "GnssView.app is not signed with a Developer ID Application identity." >&2
            exit 1
          fi

      - name: Notarize DMG
        if: startsWith(github.ref, 'refs/tags/') && steps.signing.outputs.enabled == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -euo pipefail

          if [[ -z "$APPLE_ID" || -z "$APPLE_TEAM_ID" || -z "$APPLE_APP_SPECIFIC_PASSWORD" ]]; then
            echo "Apple notarization secrets are required for macOS tag releases." >&2
            exit 1
          fi

          dmg="${{ steps.package.outputs.path }}"
          codesign --force --sign "${{ steps.signing.outputs.identity }}" --timestamp "$dmg"
          codesign --verify --verbose=2 "$dmg"
          xcrun notarytool submit "$dmg" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait
          xcrun stapler staple "$dmg"
          xcrun stapler validate "$dmg"
          spctl -a -vv -t open --context context:primary-signature "$dmg"

      - name: Delete signing keychain
        if: always() && startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail

          security delete-keychain "$RUNNER_TEMP/gnssview-signing.keychain-db" || true
          rm -f "$RUNNER_TEMP/gnssview-signing.p12"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: GnssView-macOS
          path: ${{ steps.package.outputs.path }}
          if-no-files-found: error

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          asset="${{ steps.package.outputs.path }}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "$tag" --notes "Automated GnssView release." || true
          fi
          gh release upload "$tag" "$asset" --clobber
