name: macOS CI

on:
  push:
    branches: [ master ]
    tags:
      - "v*"
      - "V*"
  pull_request:
    branches: [ master ]

permissions:
  contents: write

env:
  BUILD_TYPE: Release
  QT_VERSION: 6.8.0

jobs:
  build:
    name: Build and package macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: brew install ninja

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          modules: qtserialport
          cache: true

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build regression tests
        run: cmake --build build --target GnssViewRegression

      - name: Run regression tests
        run: ./build/GnssViewRegression

      - name: Build app
        run: cmake --build build --target GnssView

      - name: Build DMG
        run: cmake --build build --target GnssViewDmg

      - name: Locate DMG
        id: package
        run: |
          dmg="$(ls build/GnssView-*-macOS-*.dmg | head -n 1)"
          test -n "$dmg"
          echo "path=$dmg" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GnssView-macOS
          path: ${{ steps.package.outputs.path }}
          if-no-files-found: error

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          asset="${{ steps.package.outputs.path }}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "$tag" --notes "Automated GnssView release." || true
          fi
          gh release upload "$tag" "$asset" --clobber
